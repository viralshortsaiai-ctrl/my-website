<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 { font-size: 3em; }
        p { font-size: 1.2em; }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Website!</h1>
        <p>Created with ❤️ by Grok and viralshortsaiai-ctrl</p>
        <p>This is a simple, modern, responsive website hosted on GitHub Pages.</p>
        <button onclick="alert('Hello from your new website! 🚀')">Click Me!</button>
        <button onclick="window.location.href='https://github.com/viralshortsaiai-ctrl/my-website'">View on GitHub</button>
    </div>
</body>
</html>
